<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="عقارات">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="manifest.json">
<title>مدير العروض العقارية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ═══════════════════════════════════════════════
   THEME VARIABLES — SELLERS (gold) & BUYERS (emerald)
═══════════════════════════════════════════════ */
:root {
  /* Shared */
  --bg:#0f172a; --surf:#1e293b; --surf2:#0d1117; --surf3:#162032;
  --border:rgba(255,255,255,.07); --border2:rgba(255,255,255,.12);
  --text:#f1f5f9; --muted:#94a3b8; --dim:#475569;
  --green:#22c55e; --red:#ef4444; --blue:#3b82f6; --purple:#a855f7;
  --st:env(safe-area-inset-top,0px); --sb:env(safe-area-inset-bottom,0px);

  /* Seller theme (gold) */
  --primary:#f59e0b; --primary-d:#d97706; --primary-l:#fbbf24;
  --primary-bg:rgba(245,158,11,.08); --primary-border:rgba(245,158,11,.25);
  --primary-glow:rgba(245,158,11,.3);
  --hdr-from:#1a2744; --hdr-to:#0f172a;

  /* Transition */
  --theme-speed: 0.5s;
}

/* BUYER THEME overrides */
body.buyers {
  --primary:#10b981; --primary-d:#059669; --primary-l:#34d399;
  --primary-bg:rgba(16,185,129,.08); --primary-border:rgba(16,185,129,.25);
  --primary-glow:rgba(16,185,129,.3);
  --hdr-from:#0d2818; --hdr-to:#0a1f14;
}

/* Smooth transitions on all theme-aware elements */
body, .hdr, .stat, .fpill.on, .dbtn, .tbtn.on,
.btn.b-gold, .neg-toggle, .inp, .card,
.tab.on, .sort-btn.on, .filter-panel,
.af-tag, .link-box, .kpi, .bar-fill,
[class*="b-gold"], [class*="primary"] {
  transition:
    background var(--theme-speed) ease-in-out,
    border-color var(--theme-speed) ease-in-out,
    color var(--theme-speed) ease-in-out,
    box-shadow var(--theme-speed) ease-in-out;
}

*,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
html{height:100%;-webkit-text-size-adjust:100%}
body{margin:0;font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100%}
input,select,textarea{font-size:16px!important;font-family:'Tajawal',sans-serif}

@media(max-width:639px){
  body{position:fixed;width:100%;top:0;left:0;right:0;bottom:0;overflow:hidden}
  #app{height:100%;overflow:hidden}
  .scroll{overflow-y:auto;-webkit-overflow-scrolling:touch}
}
@media(min-width:640px){
  body{padding:calc(var(--st)+16px) 16px calc(var(--sb)+16px);background:#060d1a}
  #app{border-radius:24px;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,.7)}
  .scroll{overflow-y:auto;max-height:calc(100vh - 300px)}
}

#app{display:flex;flex-direction:column;width:100%;max-width:680px;margin:0 auto;background:var(--bg);position:relative}

/* ─── Header ─────────────────────────────── */
.hdr{background:linear-gradient(160deg,var(--hdr-from) 0%,var(--hdr-to) 100%);padding:calc(var(--st)+10px) 14px 10px;border-bottom:1px solid var(--primary-border);flex-shrink:0;transition:background var(--theme-speed) ease-in-out,border-color var(--theme-speed) ease-in-out}
.hdr-row{display:flex;align-items:center;gap:10px}
.hdr-icon{width:42px;height:42px;background:linear-gradient(135deg,var(--primary),var(--primary-d));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;box-shadow:0 4px 16px var(--primary-glow);transition:background var(--theme-speed) ease-in-out,box-shadow var(--theme-speed) ease-in-out}
.hdr-title{font-size:15px;font-weight:900;color:var(--text);line-height:1.2}
.hdr-sub{font-size:10px;color:var(--muted);display:flex;align-items:center;gap:5px;margin-top:2px}
.sdot{width:6px;height:6px;border-radius:50%;background:#22c55e;flex-shrink:0;transition:background var(--theme-speed)}
.hdr-badge{background:rgba(239,68,68,.2);border:1px solid rgba(239,68,68,.4);color:#fca5a5;font-size:10px;font-weight:800;padding:2px 8px;border-radius:20px;cursor:pointer;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

/* ─── MODE TOGGLE (Sellers / Buyers) ────── */
.mode-toggle-wrap{display:flex;align-items:center;justify-content:center;margin-top:10px;margin-bottom:2px}
.mode-toggle{display:flex;background:rgba(0,0,0,.35);border-radius:22px;padding:3px;gap:0;border:1px solid var(--border2);position:relative}
.mode-btn{padding:6px 20px;border-radius:18px;font-size:13px;font-weight:900;font-family:'Tajawal',sans-serif;border:none;cursor:pointer;color:var(--muted);background:transparent;transition:all var(--theme-speed) ease-in-out;position:relative;z-index:1;white-space:nowrap;touch-action:manipulation;-webkit-user-select:none;user-select:none;letter-spacing:.3px}
.mode-btn.on{color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.4)}
.mode-slider{position:absolute;top:3px;bottom:3px;border-radius:18px;transition:all var(--theme-speed) cubic-bezier(.4,0,.2,1);z-index:0;box-shadow:0 2px 10px rgba(0,0,0,.3)}
body:not(.buyers) .mode-slider{left:3px;right:50%;background:linear-gradient(135deg,#f59e0b,#d97706)}
body.buyers .mode-slider{left:50%;right:3px;background:linear-gradient(135deg,#10b981,#059669)}
/* seller btn glow when active */
body:not(.buyers) #modeSellerBtn{color:#fff;text-shadow:0 0 8px rgba(245,158,11,.6)}
body.buyers #modeBuyerBtn{color:#fff;text-shadow:0 0 8px rgba(16,185,129,.6)}
body:not(.buyers) #modeBuyerBtn{color:rgba(255,255,255,.35)}
body.buyers #modeSellerBtn{color:rgba(255,255,255,.35)}

/* ─── Stats bar ──────────────────────────── */
.stats{display:flex;gap:6px;margin-top:10px;overflow-x:auto;padding-bottom:1px;scrollbar-width:none}
.stats::-webkit-scrollbar{display:none}
.stat{flex:0 0 auto;border-radius:10px;padding:6px 12px;text-align:center;border:1px solid;min-width:60px;cursor:pointer;transition:transform .13s,opacity .13s,background var(--theme-speed),border-color var(--theme-speed)}
.stat:active{transform:scale(.92)}
.stat.on{outline:2px solid var(--primary);outline-offset:1px}
.stat-n{font-size:19px;font-weight:900;line-height:1}
.stat-l{font-size:9px;color:var(--muted);margin-top:1px}

/* ─── Scroll ─────────────────────────────── */
.scroll{flex:1;overscroll-behavior:contain;padding:11px 12px 6px;scrollbar-width:none}
.scroll::-webkit-scrollbar{display:none}

/* ─── Tabs ───────────────────────────────── */
.tabs{display:flex;background:var(--surf2);border-top:1px solid var(--border);flex-shrink:0;padding-bottom:var(--sb)}
.tab{flex:1;padding:8px 0 6px;border:none;background:transparent;color:var(--dim);font-size:10px;font-family:'Tajawal',sans-serif;cursor:pointer;font-weight:700;border-top:2.5px solid transparent;transition:color var(--theme-speed),border-color var(--theme-speed);touch-action:manipulation;-webkit-user-select:none;user-select:none;position:relative}
.tab.on{color:var(--primary);border-top-color:var(--primary)}
.tab-ic{font-size:18px;display:block;margin-bottom:1px}
.tab-badge{position:absolute;top:5px;right:calc(50% - 18px);background:#ef4444;color:#fff;font-size:9px;font-weight:900;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1.5px solid var(--surf2)}

/* ─── AI Assistant FAB ───────────────────── */
.ai-fab{position:fixed;left:16px;bottom:calc(78px + var(--sb));width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--primary-l),var(--primary-d));border:none;font-size:24px;cursor:pointer;z-index:150;box-shadow:0 6px 18px rgba(0,0,0,.4),0 0 0 0 var(--primary-glow);display:flex;align-items:center;justify-content:center;touch-action:manipulation;animation:aiPulse 2.4s ease-in-out infinite}
.ai-fab:active{transform:scale(.92)}
@keyframes aiPulse{0%,100%{box-shadow:0 6px 18px rgba(0,0,0,.4),0 0 0 0 var(--primary-glow)}50%{box-shadow:0 6px 18px rgba(0,0,0,.4),0 0 0 8px rgba(0,0,0,0)}}

/* ─── AI Chat bubbles ────────────────────── */
.ai-msg{max-width:86%;padding:10px 13px;border-radius:14px;font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.ai-msg.user{align-self:flex-start;background:var(--primary);color:#fff;border-bottom-left-radius:4px;font-weight:700}
.ai-msg.bot{align-self:flex-end;background:var(--surf3);color:var(--text);border:1px solid var(--border2);border-bottom-right-radius:4px}
.ai-result-card{align-self:flex-end;max-width:92%;width:100%;background:var(--surf3);border:1px solid var(--border2);border-radius:12px;padding:10px 12px;cursor:pointer;transition:filter .13s}
.ai-result-card:active{filter:brightness(.85)}

/* ─── Inputs ─────────────────────────────── */
.inp{width:100%;padding:11px 12px;border-radius:11px;border:1.5px solid #2a3548;background:var(--surf2);color:var(--text);font-size:16px;font-family:'Tajawal',sans-serif;-webkit-appearance:none;outline:none;transition:border-color .18s,box-shadow .18s}
.inp:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-bg)}
select.inp{cursor:pointer}
textarea.inp{resize:vertical}
.lbl{display:block;color:var(--muted);font-size:11px;margin-bottom:4px;font-weight:700}
.field{margin-bottom:12px}
.dual{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}

/* ─── Buttons ────────────────────────────── */
.btn{border:none;border-radius:11px;padding:12px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Tajawal',sans-serif;transition:all .15s;-webkit-user-select:none;user-select:none;touch-action:manipulation;width:100%;display:block}
.btn:active{transform:scale(.96)}
.b-primary{background:linear-gradient(135deg,var(--primary),var(--primary-d));color:#fff;box-shadow:0 4px 16px var(--primary-glow);transition:background var(--theme-speed) ease-in-out,box-shadow var(--theme-speed)}
.b-gold{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff}
.b-red{background:linear-gradient(135deg,#dc2626,#991b1b);color:#fff}
.b-ghost{background:rgba(255,255,255,.05);color:var(--muted);border:1px solid var(--border)}
.b-green{background:linear-gradient(135deg,#059669,#065f46);color:#fff}
.b-blue{background:linear-gradient(135deg,#2563eb,#1e40af);color:#fff}
.b-purple{background:linear-gradient(135deg,#7c3aed,#5b21b6);color:#fff}
.b-teal{background:linear-gradient(135deg,#0891b2,#0e7490);color:#fff}
.b-sm{padding:8px 12px;font-size:12px;border-radius:9px;width:auto;display:inline-block}
.wa-btn{background:linear-gradient(135deg,#25d366,#128c7e);color:#fff}

/* ─── Chip ───────────────────────────────── */
.chip{display:inline-block;padding:3px 9px;border-radius:7px;font-size:11px;font-weight:800;color:#fff}

/* ─── Direction buttons ──────────────────── */
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.dbtn{border-radius:11px;padding:11px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Tajawal',sans-serif;transition:all .15s;touch-action:manipulation;border-width:2px;border-style:solid;text-align:center}
.dbtn:active{transform:scale(.95)}

/* ─── Type buttons ───────────────────────── */
.tgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.tbtn{border-radius:10px;padding:10px 5px;font-size:12px;font-weight:800;cursor:pointer;font-family:'Tajawal',sans-serif;transition:all .15s;touch-action:manipulation;border:2px solid #2a3548;background:rgba(255,255,255,.03);color:var(--muted);text-align:center}
.tbtn.on{border-color:var(--primary);background:var(--primary-bg);color:var(--primary)}
.tbtn:active{transform:scale(.94)}

/* ─── Filter pills ───────────────────────── */
.filter-row{display:flex;gap:5px;margin-bottom:9px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.fpill{flex:0 0 auto;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:800;border:1.5px solid #2a3548;background:rgba(255,255,255,.03);color:var(--muted);cursor:pointer;font-family:'Tajawal',sans-serif;touch-action:manipulation;transition:all .15s}
.fpill.on{background:var(--primary-bg);border-color:var(--primary);color:var(--primary)}
.fpill:active{transform:scale(.93)}

/* ─── Cards ──────────────────────────────── */
.card{border-radius:14px;padding:16px 17px;margin-bottom:11px;border-width:1.5px;border-style:solid;cursor:pointer;transition:transform .13s,filter .13s;-webkit-user-select:none;user-select:none;touch-action:manipulation;position:relative}
.card:active{transform:scale(.985);filter:brightness(.87)}

/* Favorite star button on cards */
.fav-star{position:absolute;top:10px;left:10px;background:none;border:none;font-size:19px;line-height:1;cursor:pointer;padding:4px;z-index:2;filter:drop-shadow(0 1px 2px rgba(0,0,0,.4));-webkit-tap-highlight-color:transparent}
.fav-star.on{filter:drop-shadow(0 1px 3px rgba(245,158,11,.6))}

/* Buyer card style */
.buyer-card{background:rgba(16,185,129,.05) !important;border-color:rgba(16,185,129,.3) !important}

/* ─── Inbox card ─────────────────────────── */
.inbox-card{border-radius:14px;padding:13px 14px;margin-bottom:8px;background:var(--surf3);border:1.5px solid var(--border2);position:relative;cursor:pointer}

/* ─── Overlay / Sheet ────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fIn .2s ease}
@keyframes fIn{from{opacity:0}to{opacity:1}}
.sheet{background:var(--surf);border-radius:22px 22px 0 0;width:100%;max-width:680px;padding:20px 16px;padding-bottom:calc(20px + var(--sb));max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;animation:sUp .22s ease}
.sheet::-webkit-scrollbar{display:none}
@keyframes sUp{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
.sheet-handle{width:36px;height:4px;background:var(--dim);border-radius:2px;margin:0 auto 16px}

/* ─── Toast ──────────────────────────────── */
.toast{position:fixed;top:calc(var(--st)+12px);left:50%;transform:translateX(-50%);z-index:999;color:#fff;padding:9px 18px;border-radius:12px;font-weight:800;font-size:12px;font-family:'Tajawal',sans-serif;box-shadow:0 6px 24px rgba(0,0,0,.55);white-space:nowrap;max-width:90vw;animation:tIn .22s ease}
@keyframes tIn{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}

/* ─── Detail rows (IMPROVED CONTRAST) ───── */
.det-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.08)}
.det-row:last-child{border-bottom:none}
.det-k{color:#94a3b8;font-size:13px;font-weight:600}
.det-v{color:#f1f5f9;font-size:13px;font-weight:800;max-width:58%;text-align:left;word-break:break-all}
.act-row{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.act-row .btn{flex:1;min-width:76px}

/* ─── Search ─────────────────────────────── */
.srow{display:flex;gap:7px;margin-bottom:9px}
.swrap{flex:1;position:relative}
.sic{position:absolute;right:11px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:13px;pointer-events:none}
.sinp{padding-right:34px}

/* ─── Empty ──────────────────────────────── */
.empty{text-align:center;color:var(--dim);padding:50px 20px}
.e-ic{font-size:46px;margin-bottom:10px}
.e-t{font-size:14px;font-weight:800;color:var(--muted)}
.e-s{color:var(--dim);font-size:11px;margin-top:4px}

/* ─── Misc ───────────────────────────────── */
.sec-title{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:900;color:var(--text);margin-bottom:14px}
.form-note{text-align:center;color:var(--dim);font-size:10px;margin-top:12px}
.active-filters{display:flex;gap:5px;align-items:center;margin-bottom:7px;flex-wrap:wrap}
.af-tag{background:var(--primary-bg);border:1px solid var(--primary-border);color:var(--primary);font-size:10px;font-weight:800;padding:2px 9px;border-radius:20px;display:flex;align-items:center;gap:3px}
.af-x{cursor:pointer;font-size:12px;line-height:1}

/* ─── Filter panel ───────────────────────── */
.filter-panel{background:var(--surf3);border:1px solid var(--border2);border-radius:14px;padding:13px;margin-bottom:10px}
.filter-panel-title{font-size:11px;font-weight:800;color:var(--muted);margin-bottom:8px}
.range-row{display:flex;gap:7px;align-items:center}
.range-row .inp{text-align:center}
.range-sep{color:var(--dim);font-size:11px;flex-shrink:0}

/* ─── Neg toggle ─────────────────────────── */
.neg-toggle{display:flex;align-items:center;gap:9px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:10px;padding:10px 12px;cursor:pointer;transition:all .15s}
.neg-toggle.on{background:rgba(34,197,94,.15);border-color:rgba(34,197,94,.4)}
.neg-dot{width:20px;height:20px;border-radius:6px;border:2px solid #2a3548;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s;flex-shrink:0}
.neg-toggle.on .neg-dot{background:#22c55e;border-color:#22c55e}
.neg-label{font-size:12px;font-weight:800;color:var(--muted)}
.neg-toggle.on .neg-label{color:#22c55e}

/* ─── Sort bar ───────────────────────────── */
.sort-bar{display:flex;gap:6px;margin-bottom:9px;overflow-x:auto;scrollbar-width:none}
.sort-bar::-webkit-scrollbar{display:none}
.sort-btn{flex:0 0 auto;padding:5px 11px;border-radius:8px;font-size:11px;font-weight:800;border:1.5px solid #2a3548;background:rgba(255,255,255,.03);color:var(--dim);cursor:pointer;font-family:'Tajawal',sans-serif;white-space:nowrap;transition:all .15s}
.sort-btn.on{background:var(--primary-bg);border-color:var(--primary);color:var(--primary)}

/* ─── Inbox link box ─────────────────────── */
.link-box{background:var(--surf2);border:1.5px dashed var(--primary-border);border-radius:12px;padding:12px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.link-url{flex:1;font-size:11px;color:var(--muted);word-break:break-all;direction:ltr;text-align:right;line-height:1.5}
.link-copy-btn{flex-shrink:0;padding:8px 12px;border-radius:9px;background:var(--primary-bg);border:1px solid var(--primary-border);color:var(--primary);font-size:11px;font-weight:800;cursor:pointer;font-family:'Tajawal',sans-serif;white-space:nowrap;transition:all .15s}
.link-copy-btn:active{transform:scale(.93)}

/* ─── Date badge ─────────────────────────── */
.date-badge{font-size:9px;color:var(--dim);display:flex;align-items:center;gap:3px}

/* ─── KPI grid ───────────────────────────── */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.kpi{background:var(--surf2);border:1px solid var(--border);border-radius:12px;padding:13px;text-align:center}
.kpi-n{font-size:22px;font-weight:900;line-height:1;color:var(--primary);transition:color var(--theme-speed)}
.kpi-l{font-size:10px;color:var(--muted);margin-top:3px;line-height:1.3}
.bar-row{display:flex;align-items:center;gap:9px;padding:8px 12px;border-bottom:1px solid var(--border)}
.bar-track{flex:1;background:rgba(255,255,255,.05);border-radius:5px;height:7px;overflow:hidden}
.bar-fill{height:100%;border-radius:5px;transition:width .6s ease}

/* ─── Client type selector ───────────────── */
.ctype-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.ctype-btn{border-radius:12px;padding:13px 8px;font-size:13px;font-weight:900;cursor:pointer;font-family:'Tajawal',sans-serif;border:2px solid #2a3548;background:rgba(255,255,255,.03);color:var(--muted);text-align:center;transition:all .2s;touch-action:manipulation}
.ctype-btn.seller.on{border-color:#f59e0b;background:rgba(245,158,11,.12);color:#f59e0b}
.ctype-btn.buyer.on{border-color:#10b981;background:rgba(16,185,129,.12);color:#10b981}
.ctype-btn:active{transform:scale(.95)}

/* ─── Matching page ──────────────────────── */
.match-card{border-radius:14px;padding:14px;margin-bottom:10px;background:var(--surf3);border:1.5px solid var(--border2);transition:border-color .2s}
.match-score{font-size:22px;font-weight:900;line-height:1}
.match-bar{height:8px;border-radius:4px;background:rgba(255,255,255,.06);overflow:hidden;margin:6px 0}
.match-fill{height:100%;border-radius:4px;transition:width .8s ease}

// ══════════════════════════════════════════════════

const SELLERS_KEY = 'realestate_sellers_v1'; // local-only, never synced to cloud
const BUYERS_KEY  = 'realestate_buyers_v1';  // local-only, never synced to cloud

const SUPABASE_URL = 'https://jqirtyjhkfivufleteek.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxaXJ0eWpoa2ZpdnVmbGV0ZWVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNzUzMDUsImV4cCI6MjA5NzY1MTMwNX0.SK1xJ0Yd3aY6iBjhDAqWn0KUVStMBwQBaNSJmWdMpWQ';

// ══════════════════════════════════════════════════
//  STATE

let sellers=[], buyers=[], inbox=[], ignoredMatches=[];
let mode = 'sellers'; // 'sellers' | 'buyers'

// Form state
const EF = () => ({
  clientType:'seller', city:'الرياض', direction:'', neighborhood:'',

function rowToEntry(r){
  // Convert a Supabase row (snake_case) into the app's entry shape (camelCase)
  return {
    id: r.id,
    clientType: r.client_type,
    status: r.status,
    city: r.city,
    direction: r.direction,
    neighborhood: r.neighborhood,
    propertyType: r.property_type,
    sellerName: r.seller_name,
    sellerPhone: r.seller_phone,
    notes: r.notes,
    paymentMethod: r.payment_method,
    area: r.area,
    streetWidth: r.street_width,
    propertyAge: r.property_age,
    price: r.price,
    negotiable: r.negotiable,
    budgetMin: r.budget_min,
    budgetMax: r.budget_max,
    areaMin: r.area_min,
    areaMax: r.area_max,
    favorite: r.favorite,
    createdAt: r.created_at,
    _source: r.source,
  };
}

function entryToRow(e, opts){
  opts = opts || {};
  return {
    id: e.id,
    client_type: e.clientType,
    status: opts.status || e.status || 'approved',
    source: opts.source || 'manual',
    city: e.city || null,
    direction: e.direction || null,
    neighborhood: e.neighborhood || null,
    property_type: e.propertyType || null,
    seller_name: e.sellerName || null,
    seller_phone: e.sellerPhone || null,
    notes: e.notes || null,
    payment_method: e.paymentMethod || null,
    area: e.area || null,
    street_width: e.streetWidth || null,
    property_age: e.propertyAge || null,
    price: e.price || null,
    negotiable: !!e.negotiable,
    budget_min: e.budgetMin || null,
    budget_max: e.budgetMax || null,
    area_min: e.areaMin || null,
    area_max: e.areaMax || null,
    favorite: !!e.favorite,
    created_at: e.createdAt || Date.now(),
    updated_at: Date.now(),
  };
}

async function init(){
  try{ ignoredMatches = JSON.parse(localStorage.getItem(IGNORED_MATCHES_KEY)||'[]'); }catch(e){ ignoredMatches=[]; }
  // matchThreshold always starts at 60 (default), not restored from localStorage
  try{ const s=JSON.parse(localStorage.getItem('realestate_seen_inbox')||'[]'); seenInbox=new Set(s); }catch(e){}
  try{ localStatus = JSON.parse(localStorage.getItem(LOCAL_STATUS_KEY)||'{}'); }catch(e){ localStatus={}; }
  try{ hiddenInboxIds = JSON.parse(localStorage.getItem(HIDDEN_INBOX_KEY)||'{}'); }catch(e){ hiddenInboxIds={}; }
  // Load sellers/buyers from localStorage (private, never synced to cloud)
  try{ sellers = JSON.parse(localStorage.getItem(SELLERS_KEY)||'[]'); }catch(e){ sellers=[]; }
  try{ buyers  = JSON.parse(localStorage.getItem(BUYERS_KEY)||'[]');  }catch(e){ buyers=[]; }
  applyTheme();
  render();
  await loadAllFromCloud();
  if(tab===3) startInboxAutoRefresh();
  window.addEventListener('beforeunload', () => stopInboxAutoRefresh());
  if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

async function loadAllFromCloud(){
  const dot = document.getElementById('sdot');
  if(dot) dot.style.background='#eab308';
  try{
    // Fetch inbox items only (source='inbox') — shared pending pool, same for every device.
    // sellers/buyers stay local-only, and approve/reject status is local-only too (see getStatus()).
    const { data, error } = await sb.from('listings').select('*').eq('source','inbox').order('created_at', { ascending:false });
    if(error) throw error;
    const rows = data || [];
    inbox = rows.map(rowToEntry).filter(i=>!hiddenInboxIds[i.id]);
    if(dot) dot.style.background='#22c55e';
  }catch(err){
    if(dot) dot.style.background='#ef4444';
    console.error('loadAllFromCloud error:', err);
    toast('⚠️ تعذر الاتصال بقاعدة البيانات','warn');
  }
  render();
}

function save(){
  // Sellers & buyers — private, local-only, never synced to cloud
  try{ localStorage.setItem(SELLERS_KEY, JSON.stringify(sellers)); }catch(e){}
  try{ localStorage.setItem(BUYERS_KEY,  JSON.stringify(buyers));  }catch(e){}
  // Other local-only settings
  try{ localStorage.setItem(IGNORED_MATCHES_KEY, JSON.stringify(ignoredMatches)); }catch(e){}
  try{ localStorage.setItem('realestate_match_threshold', matchThreshold); }catch(e){}
  try{ localStorage.setItem('realestate_seen_inbox', JSON.stringify([...seenInbox])); }catch(e){}
  try{ localStorage.setItem(LOCAL_STATUS_KEY, JSON.stringify(localStatus)); }catch(e){}
  try{ localStorage.setItem(HIDDEN_INBOX_KEY, JSON.stringify(hiddenInboxIds)); }catch(e){}
  render();
}

// ══════════════════════════════════════════════════
//  THEME / MODE
// ══════════════════════════════════════════════════
function setMode(m){
  mode = m;
  applyTheme();
  // reset filters
  filterDirs=[]; filterTypes=[]; filterCities=[];
  priceMin=''; priceMax=''; areaMin=''; areaMax=''; search='';
  if(tab===0||tab===2) render(); else goTab(0);
}

function applyTheme(){
  const body = document.body;
  const sellerBtn = document.getElementById('modeSellerBtn');
  const buyerBtn  = document.getElementById('modeBuyerBtn');
  const hdrIcon   = document.getElementById('hdrIcon');
  const hdrTitle  = document.getElementById('hdrTitle');
  if(mode==='buyers'){
    body.classList.add('buyers');
    if(sellerBtn) sellerBtn.classList.remove('on');
    if(buyerBtn)  buyerBtn.classList.add('on');
    if(hdrIcon)   hdrIcon.textContent = '🛒';
    if(hdrTitle)  hdrTitle.textContent = 'مدير طلبات المشترين';
  } else {
    body.classList.remove('buyers');
    if(sellerBtn) sellerBtn.classList.add('on');
    if(buyerBtn)  buyerBtn.classList.remove('on');
    if(hdrIcon)   hdrIcon.textContent = '🏠';
    if(hdrTitle)  hdrTitle.textContent = 'مدير العروض العقارية';
  }
}

// ══════════════════════════════════════════════════
//  CLOUD SYNC (Supabase)
// ══════════════════════════════════════════════════

let lastInboxFetch=0;
let inboxAutoRefreshInterval = null;

function startInboxAutoRefresh(){
  if(inboxAutoRefreshInterval) clearInterval(inboxAutoRefreshInterval);
  inboxAutoRefreshInterval = setInterval(()=>{
    if(tab===3) fetchCloudInbox(false);
  }, 10000);
}

function stopInboxAutoRefresh(){
  if(inboxAutoRefreshInterval) {
    clearInterval(inboxAutoRefreshInterval);
    inboxAutoRefreshInterval = null;
  }
}

async function fetchCloudInbox(force=false){
  const now=Date.now();
  if(!force && now-lastInboxFetch<30000) return;
  lastInboxFetch=now;
  await loadAllFromCloud();
}

// Effective status of an inbox item. The PENDING list itself is shared (fetched
// from Supabase, same for every device). But the ACTION (approve/reject) is
// per-device: each device keeps its own decision in localStatus and never writes
// it back to the server, so other devices keep seeing the item as pending.
function getStatus(item){
  return localStatus[item.id] || item.status || 'pending';
}

// Delete a single inbox row from Supabase (used when clearing processed items)
async function deleteCloudInboxDoc(id){
  try{ await sb.from('listings').delete().eq('id', id); }
  catch(err){ console.error('deleteCloudInboxDoc error:', err); }
}

// Kept for compatibility with existing call sites; with Supabase, writes happen
// directly per-action (approve/reject/etc.), so this just re-syncs local state.
function syncCloudInbox(){
  if(inbox.length){
    try{ localStorage.setItem(INBOX_ARCHIVE_KEY, JSON.stringify(inbox)); }catch(e){}
  }
}

// ══════════════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════════════
function toast(msg,type='ok'){
  clearTimeout(toastT);
  const el=document.getElementById('toast');
  el.textContent=msg; el.style.display='block';
  el.style.background=type==='err'?'#dc2626':type==='info'?'#0284c7':type==='warn'?'#d97706':'#15803d';
  toastT=setTimeout(()=>el.style.display='none',3000);
}

function goTab(n){
  if(tab===1) syncFormFromDOM();
  tab=n;
  if(n!==1&&editId){ editId=null; form=EF(); form.clientType=mode==='buyers'?'buyer':'seller'; }
  [0,1,2,3,4].forEach(i=>{const el=document.getElementById('t'+i);if(el)el.className='tab'+(i===n?' on':'');});
  
  if(n===3) {
    fetchCloudInbox(true);
    startInboxAutoRefresh();
  } else {
    stopInboxAutoRefresh();
  }
  
  if(n===4) matchPageSize=10; // reset lazy load on tab enter
  render();
}
function closeOverlay(id){ document.getElementById(id).style.display='none'; }

function relativeDate(ts){
  if(!ts) return '';
  let timestamp = ts;
  if(typeof ts === 'string') {
    timestamp = new Date(ts).getTime();
  }
  const diff=Math.floor((Date.now()-timestamp)/1000);
  if(diff<60) return 'الآن';
  if(diff<3600) return 'منذ '+Math.floor(diff/60)+' دق';
  if(diff<86400) return 'منذ '+Math.floor(diff/3600)+' س';
  const d=Math.floor(diff/86400);
  if(d===1) return 'أمس';
  if(d<30) return 'منذ '+d+' يوم';
  if(d<365) return 'منذ '+Math.floor(d/30)+' شهر';
  return 'منذ '+Math.floor(d/365)+' سنة';
}
function gid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function fp(v){ const n=Number(String(v).replace(/,/g,'')); return isNaN(n)?v:n.toLocaleString('ar-SA'); }
function x(s){ return s==null?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function dl(content,type,name){ const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type}));a.download=name;a.click(); }
function dateStr(){ return new Date().toLocaleDateString('ar-SA').replace(/\//g,'-'); }
function numVal(v){ return isNaN(Number(String(v||'').replace(/,/g,'')))?0:Number(String(v||'').replace(/,/g,'')); }

// Convert Arabic/Hindi digits to Western digits instantly
function toWesternDigits(str){
  return String(str||'').replace(/[٠-٩]/g, d=>d.charCodeAt(0)-1632).replace(/[۰-۹]/g, d=>d.charCodeAt(0)-1776);
}
// Format with thousands commas, keep raw value for storage
function fmtThousands(v){
  const raw=toWesternDigits(String(v||'').replace(/,/g,''));
  const n=Number(raw);
  if(isNaN(n)||raw==='') return raw;
  return n.toLocaleString('en-US');
}
// Attach live number formatting + Arabic digit normalization to all input fields
function attachNumberInputs(){
  // 1. كل حقول text/tel/search: تحويل أرقام عربية عند blur
  document.querySelectorAll('.inp[type="text"], .inp[type="tel"], .inp[type="search"]').forEach(el=>{
    if(el._arabicAttached) return;
    el._arabicAttached=true;
    el.addEventListener('blur', function(){
      const west=toWesternDigits(this.value);
      if(west!==this.value) this.value=west;
    });
  });

  // 2. حقول السعر والميزانية (inputmode=numeric + type=text): فواصل عند blur
  const priceSelectors=['f_price','f_budgetMin','f_budgetMax'];
  priceSelectors.forEach(id=>{
    const el=document.getElementById(id);
    if(!el||el._commaAttached) return;
    el._commaAttached=true;
    el.addEventListener('blur',function(){
      const raw=toWesternDigits(this.value.replace(/,/g,'')).trim();
      const n=Number(raw);
      if(raw!==''&&!isNaN(n)&&n>0) this.value=n.toLocaleString('en-US');
      else this.value=raw;
    });
    el.addEventListener('focus',function(){
      this.value=this.value.replace(/,/g,'');
    });
  });
}

// Call after every render
const _origRender = null;
function postRender(){ attachNumberInputs(); }
function copyText(t){
  if(navigator.clipboard) navigator.clipboard.writeText(t).catch(()=>{});
  else{ const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta); }
}

async function toggleFavorite(id, ev){
  if(ev) ev.stopPropagation();
  const arr=currentData();
  const item=arr.find(o=>o.id===id);
  if(!item) return;
  item.favorite=!item.favorite;
  setCurrentData(arr);
  save();
  // sellers/buyers are local-only — no cloud sync needed
}

function toggleDirFilter(d){
  const i=filterDirs.indexOf(d); if(i>=0) filterDirs.splice(i,1); else filterDirs.push(d);
  if(tab!==0) goTab(0); else render();
}
function toggleTypeFilter(t){
  const i=filterTypes.indexOf(t); if(i>=0) filterTypes.splice(i,1); else filterTypes.push(t);
  render();
}
function toggleCityFilter(c){
  const i=filterCities.indexOf(c); if(i>=0) filterCities.splice(i,1); else filterCities.push(c);
  renderCityFilterList(); render();
}
function clearFilters(){ filterDirs=[];filterTypes=[];filterCities=[];priceMin='';priceMax='';areaMin='';areaMax='';sortBy='date';sortDir='desc';showFavoritesOnly=false;render(); }

function filtered(){
  let res=[...currentData()];
  if(search.trim()){
    const q=search.trim();
    const qNorm=normalizeNeighborhood(q);
    res=res.filter(o=>{
      // Normal includes search for all fields except neighborhood
      const basic=[o.sellerName,o.sellerPhone,o.direction,o.propertyType,o.city,o.notes].some(v=>v&&v.includes(q));
      // Fuzzy search for neighborhood
      const nbFuzzy=o.neighborhood&&normalizeNeighborhood(o.neighborhood).includes(qNorm);
      return basic||nbFuzzy;
    });
  }
  if(filterDirs.length)   res=res.filter(o=>filterDirs.includes(o.direction));
  if(filterTypes.length)  res=res.filter(o=>filterTypes.includes(o.propertyType));
  if(filterCities.length) res=res.filter(o=>filterCities.includes(o.city||'الرياض'));
  if(showFavoritesOnly)   res=res.filter(o=>o.favorite);
  if(mode==='sellers'){
    if(priceMin) res=res.filter(o=>numVal(o.price)>=Number(priceMin));
    if(priceMax) res=res.filter(o=>numVal(o.price)<=Number(priceMax));
    if(areaMin)  res=res.filter(o=>Number(o.area)>=Number(areaMin));
    if(areaMax)  res=res.filter(o=>Number(o.area)<=Number(areaMax));
  } else {
    if(priceMin) res=res.filter(o=>numVal(o.budgetMax)>=Number(priceMin));
    if(priceMax) res=res.filter(o=>numVal(o.budgetMin)<=Number(priceMax));
    if(areaMin)  res=res.filter(o=>Number(o.areaMin||0)>=Number(areaMin));
    if(areaMax)  res=res.filter(o=>Number(o.areaMax||9999999)<=Number(areaMax));
  }
  res.sort((a,b)=>{
    let va,vb;
    if(sortBy==='price'){
      va=mode==='sellers'?numVal(a.price):numVal(a.budgetMax);
      vb=mode==='sellers'?numVal(b.price):numVal(b.budgetMax);
    } else if(sortBy==='area'){
      va=Number(a.area||a.areaMax||0); vb=Number(b.area||b.areaMax||0);
    } else { va=a.createdAt||0; vb=b.createdAt||0; }
    return sortDir==='asc'?va-vb:vb-va;
  });
  return res;
}

  if(hdrBadge){ hdrBadge.style.display=pendingCount?'flex':'none'; }
  document.getElementById('inboxCount').textContent=pendingCount;

  if(matchBadge){ matchBadge.style.display=newMatchCount>0&&tab!==4?'flex':'none'; matchBadge.textContent=newMatchCount; }

  else if(tab===3) sc.innerHTML=renderInbox();
  else if(tab===4) sc.innerHTML=renderMatching();

}

function syncFormFromDOM(){
  ['sellerName','sellerPhone','neighborhood','area','streetWidth','propertyAge','notes','areaMin','areaMax'].forEach(k=>{
    const el=document.getElementById('f_'+k);
    if(el) form[k]=toWesternDigits(el.value);
  });
  // Price/budget: strip commas + convert
  ['price','budgetMin','budgetMax'].forEach(k=>{
    const el=document.getElementById('f_'+k);
    if(el) form[k]=toWesternDigits(el.value).replace(/,/g,'');
  });
  const cityEl=document.getElementById('f_city'); if(cityEl) form.city=cityEl.value;
}

  const title   = editId?(isBuyer?'✏️ تعديل طلب مشتري':'✏️ تعديل عرض بائع'):(isBuyer?'➕ طلب مشتري جديد':'➕ عرض بائع جديد');
  const curCity = form.city||'الرياض';
  const cityOptions=CITIES.map(c=>'<option value="'+c+'" '+(curCity===c?'selected':'')+'>'+c+'</option>').join('');

  let h='<div style="padding-bottom:18px"><div class="sec-title">'+title+'</div>';

  // City
  h+='<div class="field"><label class="lbl">🏙️ المدينة</label>'
    +'<select id="f_city" class="inp">'+cityOptions+'</select></div>';

  // Client type selector
  h+='<div class="field"><label class="lbl">👤 نوع العميل</label>'
    +'<div class="ctype-grid">'
    +'<div class="ctype-btn seller'+((!isBuyer)?' on':'')+'" onclick="setFormType(\'seller\')">🏷️ بائع<br><span style="font-size:10px;font-weight:500;opacity:.7">يعرض عقاراً</span></div>'
    +'<div class="ctype-btn buyer'+( isBuyer?' on':'')+'" onclick="setFormType(\'buyer\')">🛒 مشتري<br><span style="font-size:10px;font-weight:500;opacity:.7">يبحث عن عقار</span></div>'
    +'</div></div>';

  // Direction
  const dirs=DIRS.map(d=>{
    const c=DC[d],s=form.direction===d;
    return '<button class="dbtn" onclick="sf(\'direction\',\''+d+'\')" style="border-color:'+(s?c.badge:c.badge+'30')+';background:'+(s?c.bg:'rgba(255,255,255,.02)')+';color:'+(s?c.text:'#94a3b8')+'">'+(s?'✓ ':'')+d+'</button>';
  }).join('');
  h+='<div class="field"><label class="lbl">الاتجاه <span style="color:var(--dim);font-size:9px">(اختياري)</span></label><div class="dgrid">'+dirs+'</div></div>';

  // Neighborhood
  h+='<div class="field"><label class="lbl">الحي / الموقع</label>'
    +'<input id="f_neighborhood" class="inp" type="text" placeholder="مثال: حي النزهة" value="'+x(form.neighborhood||'')+'" autocomplete="off"></div>';

  // Contact fields (always shown)
  h+='<div class="field"><label class="lbl">'+(isBuyer?'اسم المشتري':'اسم البائع')+'</label>'
    +'<input id="f_sellerName" class="inp" type="text" placeholder="الاسم الكامل" value="'+x(form.sellerName||'')+'" autocomplete="off"></div>';
  h+='<div class="field"><label class="lbl">رقم الجوال <span style="color:var(--dim);font-size:9px">(اختياري)</span></label>'
    +'<input id="f_sellerPhone" class="inp" type="tel" placeholder="05xxxxxxxx" value="'+x(form.sellerPhone||'')+'" autocomplete="off" style="direction:ltr;text-align:right">'
    +'<div style="font-size:10px;color:#f59e0b;margin-top:5px;font-weight:700">⚠️ بدون رقم جوال لن تتمكن من التواصل عبر واتساب لاحقاً</div></div>';

  // Property type (for both)
  const types=TYPES.map(t=>'<button class="tbtn '+(form.propertyType===t?'on':'')+'" onclick="sfType(\''+t+'\')">'+t+'</button>').join('');
  h+='<div class="field"><label class="lbl">نوع العقار <span style="color:var(--dim);font-size:9px">(اختياري)</span></label><div class="tgrid">'+types+'</div></div>';

  // Payment method (for both)
  const pms=PAYMENT_METHODS.map(p=>'<button class="tbtn '+(form.paymentMethod===p?'on':'')+'" onclick="sfPay(\''+p+'\')">'+(PM_ICON[p]||'')+' '+p+'</button>').join('');

  } else {
    // BUYER fields
    h+='<div class="field"><label class="lbl">💰 الميزانية (ريال)</label>'
      +'<div class="range-row">'
      +'<input id="f_budgetMin" class="inp" type="text" inputmode="numeric" placeholder="من" value="'+x(form.budgetMin||'')+'" style="text-align:center">'
      +'<span class="range-sep">—</span>'
      +'<input id="f_budgetMax" class="inp" type="text" inputmode="numeric" placeholder="إلى" value="'+x(form.budgetMax||'')+'" style="text-align:center">'
      +'</div></div>'
      +'<div class="field"><label class="lbl">📐 المساحة المطلوبة (م²)</label>'
      +'<div class="range-row">'
      +'<input id="f_areaMin" class="inp" type="text" inputmode="numeric" placeholder="من" value="'+x(form.areaMin||'')+'" style="text-align:center">'
      +'<span class="range-sep">—</span>'
      +'<input id="f_areaMax" class="inp" type="text" inputmode="numeric" placeholder="إلى" value="'+x(form.areaMax||'')+'" style="text-align:center">'
      +'</div></div>';
  }

  // Notes (both)
  h+='<div class="field"><label class="lbl">ملاحظات وشروط خاصة</label>'
    +'<textarea id="f_notes" class="inp" rows="3" placeholder="مثال: قريب من مسجد، دفع كاش، شارع معين...">'+x(form.notes||'')+'</textarea></div>';

  h+='<button class="btn b-primary" style="padding:14px" onclick="submitForm()">'+(editId?'💾 حفظ التعديل':'✅ إضافة')+'</button>'
    +(editId?'<button class="btn b-ghost" style="margin-top:8px" onclick="cancelEdit()">إلغاء</button>':'')
    +'<div class="form-note">🔒 بياناتك محفوظة على جهازك فقط ولا ترفع للإنترنت</div></div>';
  return h;
}

function setFormType(t){
  syncFormFromDOM();
  form.clientType=t;
  render();
}
function sfType(t){ syncFormFromDOM(); if(form.propertyType===t) form.propertyType=''; else form.propertyType=t; render(); }
function sfPay(p){ syncFormFromDOM(); if(form.paymentMethod===p) form.paymentMethod=''; else form.paymentMethod=p; render(); }
function sf(field,val){ syncFormFromDOM(); if(form[field]===val) form[field]=''; else form[field]=val; render(); }
function toggleNeg(){ syncFormFromDOM(); form.negotiable=!form.negotiable; render(); }

async function submitForm(){
  syncFormFromDOM();
  const isBuyer=form.clientType==='buyer';

  // Normalize phone: convert Arabic/Hindi digits to Western, strip spaces/dashes
  if(form.sellerPhone){
    const ph = toWesternDigits(String(form.sellerPhone)).replace(/[\s\-]/g,'');
    form.sellerPhone = ph;
  }

  const entry={...form, id:editId||gid(), createdAt:editId?(form.createdAt||Date.now()):Date.now()};

  if(isBuyer){
    if(editId){ buyers=buyers.map(o=>o.id===editId?entry:o); }
    else buyers.unshift(entry);
  } else {
    if(editId){ sellers=sellers.map(o=>o.id===editId?entry:o); }
    else sellers.unshift(entry);
  }

  // sellers/buyers are saved to localStorage only — private, never synced to cloud
  toast(editId?'✅ تم حفظ التعديل':'✅ تمت الإضافة');
  form=EF(); editId=null;
  // sync mode to entry type
  mode=isBuyer?'buyers':'sellers';
  applyTheme();
  save(); goTab(0);
}
function cancelEdit(){ syncFormFromDOM(); form=EF(); editId=null; goTab(0); }

// Normalize a Saudi phone number to international format (966XXXXXXXXX), digits only
function normalizePhone(phone){
  let p=toWesternDigits(String(phone||'')).replace(/[^\d]/g,'');
  if(p.startsWith('00966')) p=p.slice(2);
  if(p.startsWith('0')) p='966'+p.slice(1);
  else if(p.startsWith('5')) p='966'+p;
  else if(!p.startsWith('966')) p='966'+p;
  return p;
}
function callClient(phone){
  const raw=toWesternDigits(String(phone||'')).replace(/[^\d+]/g,'');
  if(!raw) return;
  window.location.href='tel:'+raw;
}
function chatWhatsapp(phone){
  const num=normalizePhone(phone);
  if(!num) return;
  window.open('https://wa.me/'+num,'_blank');
}

function openAiChat(){
  showAiChat=true;
  document.getElementById('aiChatOverlay').style.display='flex';
  if(!aiChatMessages.length){
    pushAiMsg('bot','أهلاً 👋 أنا مساعد البحث. اكتب وش تدور عليه — مثلاً:\n«فيلا شمال الرياض تحت 2 مليون كاش» أو «مشتري ميزانيته 800 ألف حي النرجس»');
  }
  renderAiChatLog();
  setTimeout(()=>{ const inp=document.getElementById('aiChatInp'); if(inp) inp.focus(); },150);
}
function closeAiChat(ev){
  if(ev && ev.target!==ev.currentTarget) return;
  showAiChat=false;
  document.getElementById('aiChatOverlay').style.display='none';
}
function pushAiMsg(role,text,results){
  aiChatMessages.push({role,text,results:results||null});
}
function renderAiChatLog(){
  const log=document.getElementById('aiChatLog');
  if(!log) return;
  let h='';
  aiChatMessages.forEach(m=>{
    if(m.role==='user'){
      h+='<div class="ai-msg user">'+x(m.text)+'</div>';
    } else {
      h+='<div class="ai-msg bot">'+x(m.text).replace(/\n/g,'<br>')+'</div>';
      if(m.results && m.results.length){
        m.results.forEach(r=>{
          h+='<div class="ai-result-card" onclick="aiOpenResult(\''+r.id+'\',\''+r._src+'\')">'+aiResultLine(r)+'</div>';
        });
      }
    }
  });
  log.innerHTML=h;
  log.scrollTop=log.scrollHeight;
}
function aiResultLine(o){
  const isBuyer=o._src==='buyers';
  const priceTxt=isBuyer
    ? ((o.budgetMin||o.budgetMax)?fp(o.budgetMin||0)+' — '+fp(o.budgetMax||0)+' ﷼':'—')
    : (o.price?fp(o.price)+' ﷼':'—');
  return '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">'
    +'<span style="font-weight:900;font-size:13px">'+(isBuyer?'🛒 ':'🏷️ ')+x(o.sellerName||'—')+'</span>'
    +'<span style="font-weight:900;font-size:12px;color:var(--primary)">'+priceTxt+'</span></div>'
    +'<div style="font-size:11px;color:var(--muted)">'
    +(o.direction?o.direction+' • ':'')+(o.neighborhood?x(o.neighborhood)+' • ':'')+(o.propertyType||'')
    +'</div>';
}
function aiOpenResult(id,src){
  closeAiChat(); setMode(src); openDetail(id);
}

function sendAiChat(){
  const inp=document.getElementById('aiChatInp');
  if(!inp) return;
  const q=inp.value.trim();
  if(!q) return;
  inp.value='';
  pushAiMsg('user',q);
  renderAiChatLog();
  setTimeout(()=>{
    const {reply,results}=runAiSearch(q);
    pushAiMsg('bot',reply,results);
    renderAiChatLog();
  },280);
}

// Extract structured criteria from Arabic free text
function normalizeArabic(s){
  return String(s||'').replace(/[أإآ]/g,'ا').replace(/ة/g,'ه').replace(/ى/g,'ي');
}
function parseAiQuery(qRaw){
  const qOrig=toWesternDigits(qRaw);
  const q=normalizeArabic(qOrig);
  const c={ kind:null, direction:null, type:null, city:null, neighborhood:null, priceMax:null, priceMin:null, payment:null };

  // kind: seller listing vs buyer request
  if(/مشتري|طلب\s*شراء|يدور|يبي يشتري|ميزانيت/.test(q)) c.kind='buyers';
  else if(/بائع|للبيع|عرض\s*بيع/.test(q)) c.kind='sellers';

  // direction
  DIRS.forEach(d=>{ if(q.includes(normalizeArabic(d))) c.direction=d; });

  // property type
  TYPES.forEach(t=>{ if(q.includes(normalizeArabic(t))) c.type=t; });

  // payment method
  PAYMENT_METHODS.forEach(p=>{ if(q.includes(normalizeArabic(p))) c.payment=p; });

  // city (Riyadh default, check others)
  CITIES.forEach(ci=>{ if(q.includes(normalizeArabic(ci))) c.city=ci; });

  // price: handle "مليون" / "ألف" and plain numbers with تحت/اقل من/فوق/اكثر من
  const millionMatch=q.match(/(\d+(?:\.\d+)?)\s*مليون/);
  const thousandMatch=q.match(/(\d+(?:\.\d+)?)\s*الف/);
  let amount=null;
  if(millionMatch) amount=Math.round(parseFloat(millionMatch[1])*1000000);
  else if(thousandMatch) amount=Math.round(parseFloat(thousandMatch[1])*1000);
  else { const plain=q.match(/(\d{5,})/); if(plain) amount=Number(plain[1]); }

  if(amount){
    if(/تحت|اقل من|دون|لا يتجاوز/.test(q)) c.priceMax=amount;
    else if(/فوق|اكثر من|اعلى من/.test(q)) c.priceMin=amount;
    else c.priceMax=amount; // default: treat bare number as a ceiling
  }

  // neighborhood: word(s) after "حي"
  const nbMatch=q.match(/حي\s+([\u0600-\u06FF\s]{2,20}?)(?:$|[،,.\d]|تحت|فوق|اقل|اكثر|مليون|الف)/);
  if(nbMatch) c.neighborhood=nbMatch[1].trim();

  return c;
}

function runAiSearch(qRaw){
  const c=parseAiQuery(qRaw);
  const pools=[];
  if(c.kind==='buyers') pools.push(['buyers',buyers]);
  else if(c.kind==='sellers') pools.push(['sellers',sellers]);
  else { pools.push(['sellers',sellers]); pools.push(['buyers',buyers]); }

  let results=[];
  pools.forEach(([src,arr])=>{
    arr.forEach(o=>{
      let score=0, hardFail=false;
      if(c.direction){ if(o.direction===c.direction) score+=3; else hardFail=true; }
      if(c.type){ if(o.propertyType===c.type) score+=3; else hardFail=true; }
      if(c.payment){ if(o.paymentMethod===c.payment) score+=2; else hardFail=true; }
      if(c.city){ if((o.city||'الرياض')===c.city) score+=1; else hardFail=true; }
      if(c.neighborhood){
        const nb=normalizeNeighborhood(o.neighborhood||'');
        if(nb.includes(normalizeNeighborhood(c.neighborhood))) score+=3; else hardFail=true;
      }
      if(src==='sellers'){
        const price=numVal(o.price);
        if(c.priceMax){ if(price && price<=c.priceMax) score+=2; else if(price) hardFail=true; }
        if(c.priceMin){ if(price && price>=c.priceMin) score+=2; else if(price) hardFail=true; }
      } else {
        const bMin=numVal(o.budgetMin), bMax=numVal(o.budgetMax);
        if(c.priceMax){ if(bMin && bMin<=c.priceMax) score+=2; else if(bMin) hardFail=true; }
        if(c.priceMin){ if(bMax && bMax>=c.priceMin) score+=2; else if(bMax) hardFail=true; }
      }
      if(!hardFail && score>0){ o._src=src; o._score=score; results.push(o); }
    });
  });

  results.sort((a,b)=>b._score-a._score || (b.createdAt||0)-(a.createdAt||0));
  results=results.slice(0,8);

  const critParts=[];
  if(c.kind) critParts.push(c.kind==='buyers'?'طلبات شراء':'عروض بيع');
  if(c.type) critParts.push(c.type);
  if(c.direction) critParts.push(c.direction);
  if(c.neighborhood) critParts.push('حي '+c.neighborhood);
  if(c.city) critParts.push(c.city);
  if(c.payment) critParts.push(c.payment);
  if(c.priceMax) critParts.push('حتى '+fp(c.priceMax)+' ﷼');
  if(c.priceMin) critParts.push('فوق '+fp(c.priceMin)+' ﷼');

  let reply;
  if(!critParts.length){
    reply='ما قدرت أفهم معايير محددة من طلبك. جرّب تذكر: النوع (فيلا/أرض..)، الاتجاه، الحي، السعر، أو طريقة الدفع.';
  } else if(!results.length){
    reply='ما لقيت نتائج تطابق: '+critParts.join(' • ')+'\nجرّب توسيع المعايير.';
  } else {
    reply='لقيت '+results.length+' نتيجة تطابق: '+critParts.join(' • ');
  }
  return {reply, results};
}

    +'<button class="btn b-green" style="width:auto;padding:0 10px;min-width:38px" onclick="exportInboxJSON()" title="نسخة احتياطية من الوارد">💾</button>'

    +'</div>';

  // ── Filter tabs ───────────────────────────────

  const sellerCount = inbox.filter(i=>i.clientType!=='buyer').length;

  h+='<div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">';

  const pending  = filtered.filter(i=>getStatus(i)==='pending');

    }

  }

    h+='<button class="btn b-ghost" style="margin-top:10px;font-size:11px;padding:9px" onclick="clearProcessed()">🗑️ حذف المعتمدة والمرفوضة</button>';
  }
  return h+'</div>';
}

async function approveInbox(id){
  const req=inbox.find(r=>r.id===id); if(!req) return;
  const isBuyer=req.clientType==='buyer';
  const dataset=isBuyer?buyers:sellers;
  const exists=dataset.find(o=>o.id===id);

  // Approve/reject is per-device only: saved to localStatus, never written back to
  // Supabase, so the item stays "pending" for every other device.
  localStatus[id]='approved';

  if(!exists){
    const entry={...req, createdAt:req.createdAt||Date.now()};
    if(isBuyer) buyers.unshift(entry); else sellers.unshift(entry);
    // sellers/buyers are local-only — no cloud insert for the approved copy

    // Count new matches this entry creates
    const others=isBuyer?sellers:buyers;
    const newMatches=others.filter(o=>{
      const s=isBuyer?o:entry; const b=isBuyer?entry:o;
      return calcMatchScore(s,b)>=matchThreshold;
    }).length;
    if(newMatches>0){
      newMatchCount+=newMatches;
      toast('🤝 '+newMatches+' تطابق جديد! راجع تاب المطابقة','info');
    }
  }
  req.status='approved';
  toast('✅ تم الاعتماد ونقله إلى '+(isBuyer?'المشترين':'البائعين'));
  closeOverlay('approveOverlay'); save();
}

async function reApproveInbox(id){
  // Allow re-transferring even if approved before — adds a brand new copy
  const req=inbox.find(r=>r.id===id); if(!req) return;
  const isBuyer=req.clientType==='buyer';
  const entry={...req, id:gid(), createdAt:Date.now()}; // new copy
  if(isBuyer) buyers.unshift(entry); else sellers.unshift(entry);
  // sellers/buyers are local-only — no cloud insert needed
  toast('🔄 تم النقل مجدداً — أُضيف كإدخال جديد','info');
  closeOverlay('approveOverlay'); save();
}

async function rejectInbox(id){
  const req=inbox.find(r=>r.id===id); if(!req) return;
  localStatus[id]='rejected';
  req.status='rejected';
  toast('❌ تم رفض الطلب','info');
  closeOverlay('approveOverlay'); save();
}
async function clearProcessed(){
  // Status is per-device now, so we must NOT delete these rows from Supabase —
  // other devices may still consider them pending. We just hide them locally.
  const toHide=inbox.filter(i=>getStatus(i)!=='pending').map(i=>i.id);
  toHide.forEach(id=>{ hiddenInboxIds[id]=true; });
  try{ localStorage.setItem(HIDDEN_INBOX_KEY, JSON.stringify(hiddenInboxIds)); }catch(e){}
  toast('🗑️ تم تنظيف الصندوق على هذا الجهاز فقط','info'); save();
}

  }
  if(!buyers.length){
    return '<div class="empty"><div class="e-ic">🛒</div><div class="e-t">لا توجد طلبات مشترين</div><div class="e-s">أضف طلبات مشترين لبدء المطابقة</div></div>';
  }

  const threshColor = matchThreshold>=80?'#22c55e':matchThreshold>=60?'#10b981':matchThreshold>=40?'#f59e0b':'#94a3b8';

  // Compute matches
  const matches = [];
  sellers.forEach(seller=>{
    buyers.forEach(buyer=>{
      const score = calcMatchScore(seller, buyer);
      const matchKey = seller.id+'__'+buyer.id;
      if(score >= matchThreshold){
        const isIgnored = ignoredMatches.includes(matchKey);
        matches.push({seller, buyer, score, details: getMatchDetails(seller, buyer), matchKey, isIgnored});
      }
    });
  });
  matches.sort((a,b)=>b.score-a.score);

  const visibleMatches = matches.filter(m=>!m.isIgnored);
  const hiddenMatches  = matches.filter(m=>m.isIgnored);

  let h='<div style="padding-bottom:18px">'
    +'<div class="sec-title">🤝 المطابقة العقارية</div>'

    // Threshold control
    +'<div style="background:var(--surf3);border:1px solid var(--border2);border-radius:12px;padding:12px;margin-bottom:10px">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'
    +'<span style="font-size:12px;font-weight:800;color:var(--muted)">🎚️ الحد الأدنى للتطابق</span>'
    +'<span style="font-size:18px;font-weight:900;color:'+threshColor+'">'+matchThreshold+'%</span>'
    +'</div>'
    +'<input type="range" min="0" max="100" step="5" value="'+matchThreshold+'" '
    +'style="width:100%;accent-color:'+threshColor+';height:6px;cursor:pointer" '
    +'oninput="setMatchThreshold(Number(this.value))">'
    +'<div style="display:flex;justify-content:space-between;margin-top:4px">'
    +'<span style="font-size:9px;color:var(--dim)">0%</span>'
    +'<span style="font-size:9px;color:var(--dim)">50%</span>'
    +'<span style="font-size:9px;color:var(--dim)">100%</span>'
    +'</div></div>'

    // Stats row
    +'<div style="background:var(--surf3);border:1px solid var(--border2);border-radius:12px;padding:12px;margin-bottom:14px;display:flex;gap:12px;align-items:center">'
    +'<div style="text-align:center;flex:1"><div style="font-size:22px;font-weight:900;color:#f59e0b">'+sellers.length+'</div><div style="font-size:10px;color:var(--muted)">بائع</div></div>'
    +'<div style="font-size:20px;color:var(--dim)">×</div>'
    +'<div style="text-align:center;flex:1"><div style="font-size:22px;font-weight:900;color:#10b981">'+buyers.length+'</div><div style="font-size:10px;color:var(--muted)">مشتري</div></div>'
    +'<div style="font-size:20px;color:var(--dim)">=</div>'
    +'<div style="text-align:center;flex:1"><div style="font-size:22px;font-weight:900;color:var(--primary)">'+visibleMatches.length+'</div><div style="font-size:10px;color:var(--muted)">مطابقة</div></div>'
    +'</div>';

  if(!visibleMatches.length && !hiddenMatches.length){
    h+='<div class="empty"><div class="e-ic">🔍</div><div class="e-t">لا توجد مطابقات بنسبة '+matchThreshold+'%+</div>'
      +'<div class="e-s">جرب تخفيض الحد الأدنى للتطابق أعلاه</div></div>';
    return h+'</div>';
  }

  if(!visibleMatches.length){
    h+='<div class="empty"><div class="e-ic">🔍</div><div class="e-t">كل المطابقات مخفية</div><div class="e-s">يمكنك استعادتها من قسم المطابقات المخفية أدناه</div></div>';
  }

  // Reset page size when re-entering tab
  const visibleSlice = visibleMatches.slice(0, matchPageSize);
  const hasMore = visibleMatches.length > matchPageSize;

  visibleSlice.forEach((m,idx)=>{
    const scoreColor=m.score>=85?'#22c55e':m.score>=60?'#f97316':'#94a3b8';
    h+='<div class="match-card" id="mc_'+m.matchKey+'" style="border-color:'+scoreColor+'40;cursor:pointer" onclick="openMatchDetail(\''+m.seller.id+'\',\''+m.buyer.id+'\')">'
      +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">'
      +'<div>'
      +'<div style="font-size:10px;color:var(--dim);margin-bottom:2px">'
      +'<span style="background:var(--surf3);border:1px solid var(--border2);border-radius:6px;padding:1px 7px;font-weight:900;margin-left:5px">#'+(idx+1)+'</span>'
      +'اضغط لعرض التفاصيل</div>'
      +'<div style="font-size:13px;font-weight:900;color:var(--text)">'+x(m.seller.sellerName||'بائع')+'  ↔  '+x(m.buyer.sellerName||'مشتري')+'</div>'
      +'</div>'
      +'<div style="text-align:left"><div class="match-score" style="color:'+scoreColor+'">'+m.score+'%</div><div style="font-size:9px;color:var(--dim)">تطابق</div></div>'
      +'</div>'
      +'<div class="match-bar"><div class="match-fill" style="width:'+m.score+'%;background:'+scoreColor+'"></div></div>'
      +'<div style="margin-bottom:8px;display:flex;flex-wrap:wrap">'
      +m.details.map(d=>'<span class="match-tag" style="background:'+d.color+'22;color:'+d.color+';border:1px solid '+d.color+'44">'+d.label+'</span>').join('')
      +'</div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px">'
      +'<div style="background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.18);border-radius:9px;padding:8px">'
      +'<div style="font-size:10px;color:#f59e0b;font-weight:800;margin-bottom:3px">🏷️ البائع</div>'
      +'<div style="font-size:12px;font-weight:900;color:var(--text)">'+x(m.seller.sellerName||'—')+'</div>'
      +'<div style="font-size:10px;color:var(--muted);direction:ltr">'+x(m.seller.sellerPhone||'')+'</div>'
      +(m.seller.price?'<div style="font-size:11px;color:#f59e0b;font-weight:800;margin-top:2px">'+fp(m.seller.price)+' ﷼</div>':'')
      +'</div>'
      +'<div style="background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.18);border-radius:9px;padding:8px">'
      +'<div style="font-size:10px;color:#10b981;font-weight:800;margin-bottom:3px">🛒 المشتري</div>'
      +'<div style="font-size:12px;font-weight:900;color:var(--text)">'+x(m.buyer.sellerName||'—')+'</div>'
      +'<div style="font-size:10px;color:var(--muted);direction:ltr">'+x(m.buyer.sellerPhone||'')+'</div>'
      +((m.buyer.budgetMin||m.buyer.budgetMax)?'<div style="font-size:11px;color:#10b981;font-weight:800;margin-top:2px">'+fp(m.buyer.budgetMin||0)+' — '+fp(m.buyer.budgetMax||0)+' ﷼</div>':'')
      +'</div></div>'
      +'<div style="display:flex;gap:6px;flex-wrap:wrap" onclick="event.stopPropagation()">'
      +'<button class="btn wa-btn" style="font-size:11px;padding:9px;flex:1" onclick="matchWhatsapp(\''+m.seller.id+'\',\''+m.buyer.id+'\')">📱 واتساب</button>'
      +'<button class="btn b-blue" style="font-size:11px;padding:9px;flex:0 0 auto" onclick="shareMatch(\''+m.seller.id+'\',\''+m.buyer.id+'\')">📤</button>'
      +'<button class="btn" style="font-size:11px;padding:9px;flex:0 0 auto;background:rgba(148,163,184,.1);border:1px solid rgba(148,163,184,.25);color:var(--muted)" onclick="ignoreMatch(\''+m.matchKey+'\')">🙈 إخفاء</button>'
      +'</div>'
      +'</div>';
  });

  // Load more button
  if(hasMore){
    h+='<div style="text-align:center;margin:14px 0">'
      +'<button onclick="loadMoreMatches()" style="font-size:12px;font-weight:800;padding:10px 24px;border-radius:12px;cursor:pointer;font-family:Tajawal,sans-serif;background:var(--surf3);border:1px solid var(--border2);color:var(--muted)">'
      +'⬇️ تحميل المزيد ('+(visibleMatches.length-matchPageSize)+' متبقي)</button>'
      +'</div>';
  }

  // Ignored matches section
  if(hiddenMatches.length){
    h+='<div style="margin-top:18px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between">'
      +'<div style="font-size:12px;font-weight:900;color:var(--muted)">🙈 المطابقات المخفية ('+hiddenMatches.length+')</div>'
      +'<button onclick="restoreAllMatches()" style="font-size:11px;padding:5px 10px;background:rgba(148,163,184,.12);border:1px solid rgba(148,163,184,.25);color:var(--muted);border-radius:8px;cursor:pointer;font-family:Tajawal,sans-serif;font-weight:700">استعادة الكل</button>'
      +'</div>';
    hiddenMatches.forEach(m=>{
      h+='<div style="border-radius:12px;padding:11px 13px;margin-bottom:7px;background:rgba(255,255,255,.02);border:1px dashed rgba(255,255,255,.1);display:flex;align-items:center;justify-content:space-between;gap:8px">'
        +'<div>'
        +'<div style="font-size:12px;font-weight:900;color:rgba(255,255,255,.35)">'+x(m.seller.sellerName||'بائع')+' ↔ '+x(m.buyer.sellerName||'مشتري')+'</div>'
        +'<div style="font-size:10px;color:var(--dim);margin-top:2px">'+m.score+'% تطابق</div>'
        +'</div>'
        +'<div style="display:flex;gap:5px">'
        +'<button onclick="restoreMatch(\''+m.matchKey+'\')" style="font-size:11px;padding:5px 10px;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#10b981;border-radius:8px;cursor:pointer;font-family:Tajawal,sans-serif;font-weight:700">↩️ استعادة</button>'
        +'</div>'
        +'</div>';
    });
  }

  return h+'</div>';
}

function loadMoreMatches(){
  matchPageSize+=10;
  const sc=document.getElementById('scroll');
  if(sc){ sc.innerHTML=renderMatching(); postRender(); }
}

// ══════════════════════════════════════════════════
//  SMART MATCHING POPUP (from a listing's detail screen)
// ══════════════════════════════════════════════════
function openSmartMatch(id){
  const isBuyer = mode==='buyers';
  const item = (isBuyer?buyers:sellers).find(o=>o.id===id);
  if(!item) return;
  smartMatchFor = {id, isBuyer};
  smartMatchPageSize = 10;
  closeOverlay('detOverlay');
  renderSmartMatch();
  document.getElementById('smartMatchOverlay').style.display='flex';
}

function renderSmartMatch(){
  const sheet=document.getElementById('smartMatchSheet');
  if(!sheet || !smartMatchFor) return;
  const {id, isBuyer} = smartMatchFor;
  const item = (isBuyer?buyers:sellers).find(o=>o.id===id);
  if(!item){ closeOverlay('smartMatchOverlay'); return; }

  const others = isBuyer?sellers:buyers; // the opposite dataset
  let matches = others.map(o=>{
    const seller = isBuyer?o:item, buyer = isBuyer?item:o;
    const score = calcMatchScore(seller, buyer);
    return {other:o, score, details:getMatchDetails(seller, buyer)};
  }).filter(m=>m.score>=matchThreshold);
  matches.sort((a,b)=>b.score-a.score);

  const visible = matches.slice(0, smartMatchPageSize);
  const hasMore = matches.length > smartMatchPageSize;

  let h='<div class="sheet-handle"></div>'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">'
    +'<div style="font-size:15px;font-weight:900">🔍 مطابقات لـ '+x(item.sellerName||(isBuyer?'المشتري':'البائع'))+'</div>'
    +'<button onclick="closeOverlay(\'smartMatchOverlay\')" style="background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer">✕</button>'
    +'</div>';

  if(!matches.length){
    h+='<div class="empty"><div class="e-ic">🔍</div><div class="e-t">لا توجد مطابقات حالياً بهذا الحد الأدنى</div>'
      +'<div class="e-s">الحد الأدنى للتطابق: '+matchThreshold+'% — يمكنك تغييره من تبويب المطابقة</div></div>';
  } else {
    h+='<div style="font-size:11px;color:var(--muted);margin-bottom:10px">'+matches.length+' مطابقة (≥'+matchThreshold+'%)</div>';
    visible.forEach(m=>{
      const o=m.other;
      const scoreColor=m.score>=85?'#22c55e':m.score>=60?'#f97316':'#94a3b8';
      h+='<div class="match-card" style="border-color:'+scoreColor+'40">'
        +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">'
        +'<div style="font-size:13px;font-weight:900;color:var(--text)">'+x(o.sellerName||(isBuyer?'بائع':'مشتري'))+'</div>'
        +'<div style="text-align:left"><div class="match-score" style="color:'+scoreColor+'">'+m.score+'%</div></div>'
        +'</div>'
        +'<div class="match-bar"><div class="match-fill" style="width:'+m.score+'%;background:'+scoreColor+'"></div></div>'
        +'<div style="margin:8px 0;display:flex;flex-wrap:wrap">'
        +m.details.map(d=>'<span class="match-tag" style="background:'+d.color+'22;color:'+d.color+';border:1px solid '+d.color+'44">'+d.label+'</span>').join('')
        +'</div>'
        +'<div style="font-size:11px;color:var(--muted);direction:ltr;text-align:right;margin-bottom:8px">'+x(o.sellerPhone||'')+'</div>'
        +'<div style="display:flex;gap:6px;flex-wrap:wrap">'
        +(o.sellerPhone?'<button class="btn b-green" style="font-size:11px;padding:9px;flex:1" onclick="callClient(\''+x(o.sellerPhone)+'\')">📞 اتصال</button>':'')
        +(o.sellerPhone?'<button class="btn wa-btn" style="font-size:11px;padding:9px;flex:1" onclick="matchWhatsapp(\''+(isBuyer?o.id:item.id)+'\',\''+(isBuyer?item.id:o.id)+'\')">💬 واتساب</button>':'')
        +'</div>'
        +'</div>';
    });
    if(hasMore){
      h+='<div style="text-align:center;margin:14px 0">'
        +'<button onclick="loadMoreSmartMatches()" style="font-size:12px;font-weight:800;padding:10px 24px;border-radius:12px;cursor:pointer;font-family:Tajawal,sans-serif;background:var(--surf3);border:1px solid var(--border2);color:var(--muted)">'
        +'⬇️ تحميل المزيد ('+(matches.length-smartMatchPageSize)+' متبقي)</button>'
        +'</div>';
    }
  }
  sheet.innerHTML=h;
}

function loadMoreSmartMatches(){
  smartMatchPageSize+=10;
  renderSmartMatch();
}

function setMatchThreshold(v){
  matchThreshold = v;
  try{ localStorage.setItem('realestate_match_threshold', v); }catch(e){}
  const sc=document.getElementById('scroll');
  if(sc) sc.innerHTML=renderMatching();
  postRender();
}

function openMatchDetail(sellerId, buyerId){
  const seller=sellers.find(s=>s.id===sellerId);
  const buyer=buyers.find(b=>b.id===buyerId);
  if(!seller||!buyer) return;
  const score=calcMatchScore(seller,buyer);
  const scoreColor=score>=85?'#22c55e':score>=60?'#f97316':'#94a3b8';
  const details=getMatchDetails(seller,buyer);

  const sellerRows=[
    ['المدينة',seller.city||'الرياض'],['الاتجاه',seller.direction||'—'],
    ['الحي',seller.neighborhood||'—'],['نوع العقار',seller.propertyType||'—'],
    ['المساحة',seller.area?seller.area+' م²':'—'],
    ['عرض الشارع',seller.streetWidth?seller.streetWidth+' م':'—'],
    ['السعر',seller.price?fp(seller.price)+' ﷼'+(seller.negotiable?' (قابل للتفاوض)':''):'—'],
    ['التاريخ',seller.createdAt?relativeDate(seller.createdAt):'—'],
    ['ملاحظات',seller.notes||'—'],
  ];
  const buyerRows=[
    ['المدينة',buyer.city||'الرياض'],['الاتجاه المفضل',buyer.direction||'—'],
    ['الحي',buyer.neighborhood||'—'],['نوع العقار المطلوب',buyer.propertyType||'—'],
    ['الميزانية',(buyer.budgetMin||buyer.budgetMax)?fp(buyer.budgetMin||0)+' — '+fp(buyer.budgetMax||0)+' ﷼':'—'],
    ['المساحة المطلوبة',(buyer.areaMin||buyer.areaMax)?buyer.areaMin+' — '+buyer.areaMax+' م²':'—'],
    ['التاريخ',buyer.createdAt?relativeDate(buyer.createdAt):'—'],

    +'<div style="text-align:center">'

    +'</div>'
    +'<div class="match-bar" style="margin-bottom:10px"><div class="match-fill" style="width:'+score+'%;background:'+scoreColor+'"></div></div>'
    +'<div style="display:flex;flex-wrap:wrap;margin-bottom:12px">'+details.map(d=>'<span class="match-tag" style="background:'+d.color+'22;color:'+d.color+';border:1px solid '+d.color+'44">'+d.label+'</span>').join('')+'</div>'

    // Seller section
    +'<div style="font-size:12px;font-weight:900;color:#f59e0b;margin-bottom:6px;display:flex;align-items:center;gap:5px">🏷️ البائع — '+x(seller.sellerName||'—')+'</div>'
    +'<div style="background:rgba(245,158,11,.05);border:1px solid rgba(245,158,11,.2);border-radius:11px;padding:3px 11px;margin-bottom:12px">'
    +sellerRows.map(([k,v])=>'<div class="det-row"><span class="det-k">'+k+'</span><span class="det-v">'+x(v)+'</span></div>').join('')

    +buyerRows.map(([k,v])=>'<div class="det-row"><span class="det-k">'+k+'</span><span class="det-v">'+x(v)+'</span></div>').join('')

      :'<button class="btn" style="background:rgba(245,158,11,.05);border:1.5px solid rgba(245,158,11,.15);color:rgba(245,158,11,.4);font-size:12px;padding:11px 6px" disabled>لا يوجد رقم بائع</button>'

function deleteMatch(matchKey){
  // Delete match means removing both seller and buyer from their arrays
  const [sellerId, buyerId] = matchKey.split('__');
  if(!confirm('⚠️ هذا سيحذف بيانات البائع والمشتري نهائياً. هل أنت متأكد؟')) return;

// ══════════════════════════════════════════════════
//  FUZZY NEIGHBORHOOD NORMALIZATION
// ══════════════════════════════════════════════════
function normalizeNeighborhood(str){
  if(!str) return '';
  let s = str.trim();
  // Remove leading "حي " (with or without space variants)
  s = s.replace(/^حي\s+/,'');
  // Remove definite article "ال" at start
  s = s.replace(/^ال/,'');
  // Remove extra spaces
  s = s.replace(/\s+/g,' ').trim();
  // Unify alef variants → ا
  s = s.replace(/[أإآ]/g,'ا');
  // Unify ta marbuta → ه
  s = s.replace(/ة/g,'ه');
  return s;
}

function neighborhoodsMatch(n1, n2){
  if(!n1||!n2) return false;
  const a = normalizeNeighborhood(n1);
  const b = normalizeNeighborhood(n2);
  if(!a||!b) return false;
  // Exact after normalization, or one contains the other
  return a===b || a.includes(b) || b.includes(a);
}

// ══════════════════════════════════════════════════
//  WEIGHTED MATCH SCORE
//  Weights: Neighborhood 35% | Price 25% | Direction 15% | Area 15% | Type 10%
//  City is a mandatory filter — if different → score = 0
// ══════════════════════════════════════════════════
function calcMatchScore(seller, buyer){
  // CRUCIAL FILTER: city must match
  const sCity = (seller.city||'الرياض').trim();
  const bCity = (buyer.city||'الرياض').trim();
  if(sCity !== bCity) return 0;

  let score = 0;

  // ── 1. Neighborhood (35%) ──────────────────────
  if(seller.neighborhood && buyer.neighborhood){
    if(neighborhoodsMatch(seller.neighborhood, buyer.neighborhood)) score += 35;
    // else 0 — no partial for neighborhood
  } else {
    // One or both unknown → half credit
    score += 17;
  }

  // ── 2. Price vs Budget (25%) ───────────────────
  const price = numVal(seller.price);
  const bMin  = numVal(buyer.budgetMin);
  const bMax  = numVal(buyer.budgetMax);
  if(price > 0 && bMax > 0){
    if(price <= bMax && (bMin === 0 || price >= bMin)){
      score += 25; // fully within budget
    } else if(price <= bMax * 1.1){
      score += 13; // up to 10% over budget → partial
    }
    // else 0
  } else {
    score += 13; // unknown price or budget → half credit
  }

  // ── 3. Direction / Facade (15%) ────────────────
  if(seller.direction && buyer.direction){
    if(seller.direction === buyer.direction) score += 15;
    // else 0
  } else {
    score += 7; // no preference → half credit
  }

  // ── 4. Area (15%) ─────────────────────────────
  const area = Number(seller.area) || 0;
  const aMin = Number(buyer.areaMin) || 0;
  const aMax = Number(buyer.areaMax) || 999999;
  if(area > 0 && (aMin > 0 || aMax < 999999)){
    if(area >= aMin && area <= aMax){
      score += 15; // within range
    } else {
      // Within ±20% of range edges → partial
      const lo = aMin * 0.8;
      const hi = aMax * 1.2;
      if(area >= lo && area <= hi) score += 7;
      // else 0
    }
  } else {
    score += 7; // unknown → half credit
  }

  // ── 5. Property Type (10%) ────────────────────
  if(seller.propertyType && buyer.propertyType){
    if(seller.propertyType === buyer.propertyType) score += 10;
    // else 0
  } else {
    score += 5; // unknown → half credit
  }

  return Math.min(100, Math.round(score));
}

function getMatchDetails(seller, buyer){
  const details = [];

  // City (mandatory)
  const sCity = (seller.city||'الرياض').trim();
  const bCity = (buyer.city||'الرياض').trim();
  if(sCity === bCity) details.push({label:'✅ نفس المدينة', color:'#22c55e'});
  else                details.push({label:'❌ مدينة مختلفة', color:'#ef4444'});

  // Neighborhood
  if(seller.neighborhood && buyer.neighborhood){
    if(neighborhoodsMatch(seller.neighborhood, buyer.neighborhood))
      details.push({label:'✅ الحي يطابق (35%)', color:'#22c55e'});
    else
      details.push({label:'❌ حي مختلف', color:'#ef4444'});
  } else {
    details.push({label:'⚠️ الحي غير محدد', color:'#94a3b8'});
  }

  // Price
  const price = numVal(seller.price);
  const bMin  = numVal(buyer.budgetMin);
  const bMax  = numVal(buyer.budgetMax);
  if(price > 0 && bMax > 0){
    if(price <= bMax && (bMin===0||price>=bMin)) details.push({label:'✅ ضمن الميزانية (25%)', color:'#22c55e'});
    else if(price <= bMax*1.1)                   details.push({label:'⚠️ قريب من الميزانية', color:'#f59e0b'});
    else                                          details.push({label:'❌ فوق الميزانية', color:'#ef4444'});
  }

  // Direction
  if(seller.direction && buyer.direction){
    if(seller.direction === buyer.direction) details.push({label:'✅ الاتجاه يطابق (15%)', color:'#22c55e'});
    else                                     details.push({label:'⚠️ اتجاه مختلف', color:'#f59e0b'});
  }

  // Area
  const area = Number(seller.area)||0;
  const aMin = Number(buyer.areaMin)||0;
  const aMax = Number(buyer.areaMax)||999999;
  if(area>0 && (aMin>0||aMax<999999)){
    if(area>=aMin&&area<=aMax)                 details.push({label:'✅ المساحة مناسبة (15%)', color:'#22c55e'});
    else if(area>=aMin*0.8&&area<=aMax*1.2)   details.push({label:'⚠️ مساحة قريبة', color:'#f59e0b'});
    else                                        details.push({label:'❌ مساحة غير مناسبة', color:'#ef4444'});
  }

  // Type
  if(seller.propertyType && buyer.propertyType){
    if(seller.propertyType === buyer.propertyType) details.push({label:'✅ النوع يطابق (10%)', color:'#22c55e'});
    else                                            details.push({label:'❌ نوع مختلف', color:'#ef4444'});
  }

  if(seller.negotiable) details.push({label:'🤝 قابل للتفاوض', color:'#10b981'});
  return details;
}

// Opens a direct WhatsApp chat with a single contact (no pre-filled message)
function openWhatsapp(phone){
  if(!phone){ toast('⚠️ لا يوجد رقم جوال','warn'); return; }
  // Normalize: strip spaces, dashes; prepend 966 if starts with 05
  let num = String(phone).replace(/[\s\-]/g,'');
  if(num.startsWith('05')) num = '966'+num.slice(1);
  else if(num.startsWith('5') && num.length===9) num = '966'+num;
  window.open('https://wa.me/'+encodeURIComponent(num),'_blank');
}

function doImportInbox(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=async e=>{
    try{
      let data=JSON.parse(e.target.result);
      if(!Array.isArray(data)) throw new Error();
      const existIds=new Set(inbox.map(i=>i.id));
      let added=0;
      data.forEach(item=>{
        if(!item||!item.id||existIds.has(item.id)) return;
        inbox.push(item); existIds.add(item.id); added++;

      inbox.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));

      toast('❌ ملف غير صالح','err');

    }
  };
  reader.readAsText(file,'utf-8');
}

  const csv='\uFEFF'+[H,...rows].map(r=>r.map(c=>'"'+(c||'').replace(/"/g,'""')+'"').join(',')).join('\n');
  const name=(mode==='buyers'?'طلبات_المشترين_':'عقارات_البائعين_')+dateStr()+'.csv';
  dl(csv,'text/csv',name);
  toast('📊 تم التصدير CSV');
}
