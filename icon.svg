<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="22" fill="#0f172a"/>
  <rect width="100" height="100" rx="22" fill="url(#g)"/>
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2744"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
  </defs>
  <!-- House shape -->
  <polygon points="50,18 82,42 82,78 18,78 18,42" fill="none" stroke="#f59e0b" stroke-width="4" stroke-linejoin="round"/>
  <polygon points="50,18 82,42 18,42" fill="#f59e0b" opacity="0.15"/>
  <!-- Door -->
  <rect x="40" y="56" width="20" height="22" rx="3" fill="#f59e0b" opacity="0.9"/>
  <!-- Roof peak line -->
